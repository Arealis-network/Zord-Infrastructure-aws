name: SES Terraform

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('SES Terraform PR Plan #{0}', github.event.pull_request.number)
    || format('SES Terraform {0} ({1})',
        github.event.inputs.action || 'plan',
        github.event.inputs.environment || 'production')
  }}

on:
  pull_request:
    paths:
      - "ses-terraform/**"
      - ".github/workflows/ses-terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      action:
        description: "Choose what you want to do"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to destroy SES resources"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

concurrency:
  group: ses-terraform-${{ github.event.inputs.environment || 'pr' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "ses-terraform"
  AWS_REGION_VALUE: "ap-south-1"

jobs:
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ses/production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="environment=production" -no-color

  terraform-manual:
    name: "Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ses/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Apply Summary
        if: github.event.inputs.action == 'apply'
        run: |
          SES_DOMAIN="$(terraform output -raw ses_domain)"
          VERIFICATION_TOKEN="$(terraform output -raw ses_verification_token)"
          ROLE_ARN="$(terraform output -raw ses_send_role_arn)"
          MAIL_FROM="$(terraform output -raw ses_mail_from_domain)"

          {
            echo "## SES Setup Complete (${{ github.event.inputs.environment }})"
            echo ""
            echo "**Domain:** \`${SES_DOMAIN}\`"
            echo "**SES Send Role ARN:** \`${ROLE_ARN}\`"
            echo ""
            echo "---"
            echo ""
            echo "### DNS Records You Must Add"
            echo ""
            echo "#### 1. Domain Verification (TXT record)"
            echo ""
            echo "| Host | Type | Value |"
            echo "|---|---|---|"
            echo "| \`_amazonses.${SES_DOMAIN}\` | TXT | \`${VERIFICATION_TOKEN}\` |"
            echo ""
            echo "#### 2. DKIM (3 CNAME records)"
            echo ""
            echo "Run this to get the tokens:"
            echo ""
            echo "\`\`\`bash"
            echo "terraform -chdir=ses-terraform output ses_dkim_tokens"
            echo "\`\`\`"
            echo ""
            echo "Create CNAME records:"
            echo "\`<token>._domainkey.${SES_DOMAIN}\` → \`<token>.dkim.amazonses.com\`"
            echo ""
            echo "#### 3. MAIL FROM (MX + SPF)"
            echo ""
            echo "| Host | Type | Value |"
            echo "|---|---|---|"
            echo "| \`${MAIL_FROM}\` | MX | \`10 feedback-smtp.${{ env.AWS_REGION_VALUE }}.amazonses.com\` |"
            echo "| \`${MAIL_FROM}\` | TXT | \`v=spf1 include:amazonses.com ~all\` |"
            echo ""
            echo "---"
            echo ""
            echo "After adding DNS records, SES will verify automatically within a few minutes."
            echo ""
            echo "If your account is in the SES sandbox, request production access from:"
            echo "AWS Console → SES → Account dashboard → Request production access"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          {
            echo "## SES Terraform Destroy (${{ github.event.inputs.environment }})"
            echo ""
            echo "- SES domain identity, DKIM, MAIL FROM removed"
            echo "- SES send IAM role and policy removed"
            echo "- Pod identity association removed"
            echo "- State: \`ses/${{ github.event.inputs.environment }}/terraform.tfstate\`"
          } >> "$GITHUB_STEP_SUMMARY"
