name: SES Terraform

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('SES Terraform PR Plan #{0}', github.event.pull_request.number)
    || format('SES Terraform {0} ({1})',
        github.event.inputs.action || 'plan',
        github.event.inputs.environment || 'production')
  }}

on:
  pull_request:
    paths:
      - "ses-terraform/**"
      - ".github/workflows/ses-terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      action:
        description: "Choose what you want to do"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to destroy SES resources"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

concurrency:
  group: ses-terraform-${{ github.event.inputs.environment || 'pr' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "ses-terraform"
  AWS_REGION_VALUE: "ap-south-1"

jobs:
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ses/production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="environment=production" -no-color

  terraform-manual:
    name: "Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ses/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Apply Summary
        if: github.event.inputs.action == 'apply'
        run: |
          SES_DOMAIN="$(terraform output -raw ses_domain)"
          VERIFICATION_TOKEN="$(terraform output -raw ses_verification_token)"
          ROLE_ARN="$(terraform output -raw ses_send_role_arn)"
          MAIL_FROM="$(terraform output -raw ses_mail_from_domain)"

          # Get DKIM tokens as JSON array and extract each one
          DKIM_JSON="$(terraform output -json ses_dkim_tokens)"
          DKIM_1="$(echo "${DKIM_JSON}" | jq -r '.[0]')"
          DKIM_2="$(echo "${DKIM_JSON}" | jq -r '.[1]')"
          DKIM_3="$(echo "${DKIM_JSON}" | jq -r '.[2]')"

          {
            echo "## SES Setup Complete (${{ github.event.inputs.environment }})"
            echo ""
            echo "**Domain:** \`${SES_DOMAIN}\`"
            echo "**SES Send Role ARN:** \`${ROLE_ARN}\`"
            echo ""
            echo "---"
            echo ""
            echo "## DNS Records You Must Add (all 6)"
            echo ""
            echo "Go to your DNS provider (wherever \`${SES_DOMAIN}\` is managed) and add these records:"
            echo ""
            echo "### 1. Domain Verification (TXT record)"
            echo ""
            echo "| Type | Host | Value |"
            echo "|---|---|---|"
            echo "| TXT | \`_amazonses.${SES_DOMAIN}\` | \`${VERIFICATION_TOKEN}\` |"
            echo ""
            echo "### 2. DKIM (3 CNAME records)"
            echo ""
            echo "| Type | Host | Value |"
            echo "|---|---|---|"
            echo "| CNAME | \`${DKIM_1}._domainkey.${SES_DOMAIN}\` | \`${DKIM_1}.dkim.amazonses.com\` |"
            echo "| CNAME | \`${DKIM_2}._domainkey.${SES_DOMAIN}\` | \`${DKIM_2}.dkim.amazonses.com\` |"
            echo "| CNAME | \`${DKIM_3}._domainkey.${SES_DOMAIN}\` | \`${DKIM_3}.dkim.amazonses.com\` |"
            echo ""
            echo "### 3. MAIL FROM (MX + SPF)"
            echo ""
            echo "| Type | Host | Value |"
            echo "|---|---|---|"
            echo "| MX | \`${MAIL_FROM}\` | \`10 feedback-smtp.${{ env.AWS_REGION_VALUE }}.amazonses.com\` |"
            echo "| TXT | \`${MAIL_FROM}\` | \`v=spf1 include:amazonses.com ~all\` |"
            echo ""
            echo "---"
            echo ""
            echo "## What To Do Next"
            echo ""
            echo "1. Add all 6 DNS records above to your DNS provider"
            echo "2. Wait 5-10 minutes for SES to verify automatically"
            echo "3. Check status: AWS Console → SES → Identities → ${SES_DOMAIN}"
            echo "4. If still in sandbox: AWS Console → SES → Account dashboard → Request production access"
            echo ""
            echo "After verification, your pods in namespace \`zord\` with service account \`zord-app\` can send emails using the AWS SDK. No API keys needed."
            echo ""
            echo "---"
            echo ""
            echo "## Alternative: Get DNS Records From AWS Console"
            echo ""
            echo "1. Go to **AWS Console → SES**"
            echo "2. Left sidebar → **Configuration → Identities**"
            echo "3. Click on **${SES_DOMAIN}**"
            echo "4. Click the **Authentication** tab"
            echo "5. All DNS records are listed there with copy buttons"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          {
            echo "## SES Terraform Destroy (${{ github.event.inputs.environment }})"
            echo ""
            echo "- SES domain identity, DKIM, MAIL FROM removed"
            echo "- SES send IAM role and policy removed"
            echo "- Pod identity association removed"
            echo "- State: \`ses/${{ github.event.inputs.environment }}/terraform.tfstate\`"
          } >> "$GITHUB_STEP_SUMMARY"
