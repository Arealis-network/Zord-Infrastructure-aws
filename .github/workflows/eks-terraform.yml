name: EKS Terraform

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('EKS Terraform PR Plan #{0}', github.event.pull_request.number)
    || format('EKS Terraform {0} ({1})',
        github.event.inputs.action || 'plan',
        github.event.inputs.environment || 'production')
  }}

on:
  pull_request:
    paths:
      - "EKS-terraform/**"
      - ".github/workflows/eks-terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      action:
        description: "Choose what you want to do with the cluster"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to delete the entire cluster"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

concurrency:
  group: eks-terraform-${{ github.event.inputs.environment || 'pr' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "EKS-terraform"
  AWS_REGION_VALUE: "ap-south-1"

jobs:
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=eks/production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="environment=production" -no-color

  terraform-manual:
    name: "Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=eks/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Verify EKS Cluster Exists
        if: github.event.inputs.action == 'apply'
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "Expected cluster from Terraform output: ${CLUSTER_NAME}"

          if ! aws eks describe-cluster --name "${CLUSTER_NAME}" --region "${{ env.AWS_REGION_VALUE }}" >/dev/null 2>&1; then
            echo "Cluster ${CLUSTER_NAME} was not found in region ${{ env.AWS_REGION_VALUE }}."
            echo "Clusters currently visible in this account and region:"
            aws eks list-clusters --region "${{ env.AWS_REGION_VALUE }}" || true
            exit 1
          fi

          aws eks wait cluster-active --name "${CLUSTER_NAME}" --region "${{ env.AWS_REGION_VALUE }}"

      - name: Install Cluster Autoscaler
        if: github.event.inputs.action == 'apply'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CA_ROLE_ARN=$(terraform output -raw cluster_autoscaler_role_arn)

          export CLUSTER_NAME CA_ROLE_ARN
          export AWS_REGION="${{ env.AWS_REGION_VALUE }}"

          bash ./install-autoscaler.sh

      - name: Install External Secrets Operator
        if: github.event.inputs.action == 'apply'
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
          fi

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          export CLUSTER_NAME="$(terraform output -raw cluster_name)"
          export ESO_NAMESPACE="external-secrets"
          export ESO_SERVICE_ACCOUNT="external-secrets"
          export AWS_REGION="${{ env.AWS_REGION_VALUE }}"

          bash ./install-external-secrets.sh

      - name: Cluster Connection Summary
        if: github.event.inputs.action == 'apply'
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          RESOURCE_COUNT=$(terraform show -json | jq '[.values.root_module.resources | length] | add // 0')
          {
            echo "## 🎉 Your ${{ github.event.inputs.environment }} Kubernetes Cluster Is Ready"
            echo ""
            echo "**Cluster: \`${CLUSTER_NAME}\`**"
            echo "**Environment: \`${{ github.event.inputs.environment }}\`**"
            echo "**Total resources created: ${RESOURCE_COUNT}**"
            echo ""
            echo "---"
            echo ""
            echo "## Connect To Your Cluster"
            echo ""
            echo "\`\`\`bash"
            echo "aws eks update-kubeconfig --region ${{ env.AWS_REGION_VALUE }} --name ${CLUSTER_NAME}"
            echo "\`\`\`"
            echo ""
            echo "## Verify"
            echo ""
            echo "\`\`\`bash"
            echo "kubectl get nodes"
            echo "kubectl get pods -A"
            echo "kubectl get pods -n external-secrets"
            echo "kubectl get pods -n kube-system | grep cluster-autoscaler"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pre-Destroy Helm Uninstall
        if: github.event.inputs.action == 'destroy'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          if [ -z "${CLUSTER_NAME}" ]; then
            echo "Could not determine cluster name. Skipping Helm uninstall."
            exit 0
          fi

          export CLUSTER_NAME
          export AWS_REGION="${{ env.AWS_REGION_VALUE }}"

          bash ./uninstall-helm.sh

      - name: Pre-Destroy Kubernetes Cleanup
        if: github.event.inputs.action == 'destroy'
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "")

          if [ -z "${CLUSTER_NAME}" ]; then
            echo "Could not determine cluster name. Skipping Kubernetes cleanup."
            exit 0
          fi

          if ! aws eks describe-cluster --name "${CLUSTER_NAME}" --region "${{ env.AWS_REGION_VALUE }}" >/dev/null 2>&1; then
            echo "Cluster ${CLUSTER_NAME} not found. Skipping Kubernetes cleanup."
            exit 0
          fi

          aws eks update-kubeconfig --region "${{ env.AWS_REGION_VALUE }}" --name "${CLUSTER_NAME}"

          kubectl get svc -A -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > lb-services.txt || true
          kubectl get ingress -A -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' > ingress.txt || true
          kubectl get ns -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' > namespaces.txt || true

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete ingress "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < ingress.txt

          while read -r NAMESPACE NAME; do
            [ -z "${NAMESPACE}" ] && continue
            kubectl delete svc "${NAME}" -n "${NAMESPACE}" --ignore-not-found=true || true
          done < lb-services.txt

          kubectl delete deployment,statefulset,daemonset,job,cronjob,pod,service,ingress,pvc --all -n default --ignore-not-found=true || true

          while read -r NAMESPACE; do
            [ -z "${NAMESPACE}" ] && continue
            case "${NAMESPACE}" in kube-system|kube-public|kube-node-lease|default) continue ;; esac
            kubectl delete namespace "${NAMESPACE}" --ignore-not-found=true --wait=false || true
          done < namespaces.txt

          echo "Waiting for load balancers and ENIs to clean up..."
          sleep 180

      - name: Capture Destroy Subnet IDs
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform output -json private_subnet_ids > private-subnet-ids.json 2>/dev/null || echo '[]' > private-subnet-ids.json
          terraform output -json public_subnet_ids > public-subnet-ids.json 2>/dev/null || echo '[]' > public-subnet-ids.json

          jq -r '.[]' private-subnet-ids.json > subnet-ids.txt 2>/dev/null || true
          jq -r '.[]' public-subnet-ids.json >> subnet-ids.txt 2>/dev/null || true

          RESOURCE_COUNT=$(terraform show -json | jq '[.values.root_module.resources | length] | add // 0')
          echo "${RESOURCE_COUNT}" > resource-count.txt

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        id: terraform_destroy
        continue-on-error: true
        run: terraform destroy -auto-approve -no-color

      - name: Cleanup Available Network Interfaces
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          touch eni-cleanup.txt

          while read -r SUBNET_ID; do
            [ -z "${SUBNET_ID}" ] && continue
            aws ec2 describe-network-interfaces \
              --filters "Name=subnet-id,Values=${SUBNET_ID}" "Name=status,Values=available" \
              --region "${{ env.AWS_REGION_VALUE }}" \
              --query 'NetworkInterfaces[].NetworkInterfaceId' \
              --output text >> eni-cleanup.txt
          done < subnet-ids.txt

          sort -u eni-cleanup.txt -o eni-cleanup.txt

          while read -r ENI_ID; do
            [ -z "${ENI_ID}" ] && continue
            echo "Deleting available ENI: ${ENI_ID}"
            aws ec2 delete-network-interface \
              --network-interface-id "${ENI_ID}" \
              --region "${{ env.AWS_REGION_VALUE }}" || true
          done < eni-cleanup.txt

      - name: Retry Security Group Cleanup
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: |
          VPC_ID="$(terraform output -raw -no-color vpc_id 2>/dev/null | grep -Eo '^vpc-[0-9a-f]+' | head -n1 || true)"
          if [ -z "${VPC_ID}" ]; then
            VPC_ID="$(terraform state pull 2>/dev/null | jq -r '.resources[] | select(.type=="aws_vpc") | .instances[0].attributes.id' | head -n1 || true)"
          fi

          if [ -z "${VPC_ID}" ]; then
            exit 0
          fi

          aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${{ env.AWS_REGION_VALUE }}" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" \
            --output text > sg-ids.txt || true

          tr '\t' '\n' < sg-ids.txt | while read -r SG_ID; do
            [ -z "${SG_ID}" ] && continue
            aws ec2 delete-security-group --group-id "${SG_ID}" --region "${{ env.AWS_REGION_VALUE }}" || true
          done

      - name: Terraform Destroy Retry
        if: github.event.inputs.action == 'destroy' && steps.terraform_destroy.outcome == 'failure'
        run: terraform destroy -auto-approve -no-color

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          RESOURCE_COUNT=$(cat resource-count.txt 2>/dev/null || echo "0")
          {
            echo "## 🗑️ ${{ github.event.inputs.environment }} Cluster Destroyed"
            echo ""
            echo "**Environment: \`${{ github.event.inputs.environment }}\`**"
            echo "**Total resources deleted: ${RESOURCE_COUNT}**"
            echo ""
            echo "> State file: \`eks/${{ github.event.inputs.environment }}/terraform.tfstate\`"
          } >> "$GITHUB_STEP_SUMMARY"
