name: Secret Manager Terraform

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('Secret Manager PR Plan #{0}', github.event.pull_request.number)
    || format('Secret Manager {0} ({1})',
        github.event.inputs.action || 'plan',
        github.event.inputs.environment || 'production')
  }}

on:
  pull_request:
    paths:
      - "secret-manager/**"
      - ".github/workflows/secrets-manager-terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      action:
        description: "Choose what you want to do with Secrets Manager"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to delete the secrets"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

concurrency:
  group: secret-manager-${{ github.event.inputs.environment || 'pr' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "secret-manager"
  AWS_REGION_VALUE: "ap-south-1"

jobs:
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=secret-manager/production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="environment=production" -no-color

  terraform-manual:
    name: "Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=secret-manager/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Update Application Secret Value
        if: github.event.inputs.action == 'apply'
        env:
          ZORD_APP_SECRETS_JSON_STAGING: ${{ secrets.ZORD_APP_SECRETS_JSON_STAGING }}
          ZORD_APP_SECRETS_JSON_PRODUCTION: ${{ secrets.ZORD_APP_SECRETS_JSON_PRODUCTION }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "${ENV}" = "staging" ]; then
            SECRET_VALUE="${ZORD_APP_SECRETS_JSON_STAGING}"
          else
            SECRET_VALUE="${ZORD_APP_SECRETS_JSON_PRODUCTION}"
          fi

          if [ -z "${SECRET_VALUE}" ]; then
            echo "GitHub secret ZORD_APP_SECRETS_JSON_${ENV^^} is empty."
            exit 1
          fi

          APP_SECRET_NAME="$(terraform output -raw app_secret_name)"
          APP_SECRET_FILE="$(mktemp)"
          printf '%s' "${SECRET_VALUE}" > "${APP_SECRET_FILE}"

          aws secretsmanager update-secret \
            --secret-id "${APP_SECRET_NAME}" \
            --secret-string "file://${APP_SECRET_FILE}" \
            --region "${{ env.AWS_REGION_VALUE }}"

          rm -f "${APP_SECRET_FILE}"

      - name: Update Edge Signing Key Secret Value
        if: github.event.inputs.action == 'apply'
        env:
          ZORD_EDGE_SIGNING_KEY_JSON_STAGING: ${{ secrets.ZORD_EDGE_SIGNING_KEY_JSON_STAGING }}
          ZORD_EDGE_SIGNING_KEY_JSON_PRODUCTION: ${{ secrets.ZORD_EDGE_SIGNING_KEY_JSON_PRODUCTION }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "${ENV}" = "staging" ]; then
            SECRET_VALUE="${ZORD_EDGE_SIGNING_KEY_JSON_STAGING}"
          else
            SECRET_VALUE="${ZORD_EDGE_SIGNING_KEY_JSON_PRODUCTION}"
          fi

          if [ -z "${SECRET_VALUE}" ]; then
            echo "GitHub secret ZORD_EDGE_SIGNING_KEY_JSON_${ENV^^} is empty."
            exit 1
          fi

          EDGE_SECRET_NAME="$(terraform output -raw edge_signing_key_secret_name)"
          EDGE_SECRET_FILE="$(mktemp)"
          printf '%s' "${SECRET_VALUE}" > "${EDGE_SECRET_FILE}"

          aws secretsmanager update-secret \
            --secret-id "${EDGE_SECRET_NAME}" \
            --secret-string "file://${EDGE_SECRET_FILE}" \
            --region "${{ env.AWS_REGION_VALUE }}"

          rm -f "${EDGE_SECRET_FILE}"

      - name: Apply Summary
        if: github.event.inputs.action == 'apply'
        run: |
          APP_SECRET_NAME="$(terraform output -raw app_secret_name)"
          EDGE_SECRET_NAME="$(terraform output -raw edge_signing_key_secret_name)"

          {
            echo "## AWS Secrets Manager Apply (${{ github.event.inputs.environment }})"
            echo ""
            echo "- App secret: \`${APP_SECRET_NAME}\`"
            echo "- Edge signing key: \`${EDGE_SECRET_NAME}\`"
            echo "- Secret values pushed from GitHub Actions secrets"
            echo "- State: \`secret-manager/${{ github.event.inputs.environment }}/terraform.tfstate\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          {
            echo "## AWS Secrets Manager Destroy (${{ github.event.inputs.environment }})"
            echo ""
            echo "- Terraform destroy completed for the secret-manager stack"
            echo "- Environment: \`${{ github.event.inputs.environment }}\`"
            echo "- State: \`secret-manager/${{ github.event.inputs.environment }}/terraform.tfstate\`"
          } >> "$GITHUB_STEP_SUMMARY"
