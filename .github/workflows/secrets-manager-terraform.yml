name: Secret Manager Terraform

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('Secret Manager PR Plan #{0}', github.event.pull_request.number)
    || github.event.inputs.action == 'apply'
    && 'Secret Manager Apply'
    || github.event.inputs.action == 'destroy'
    && 'Secret Manager Destroy'
    || github.event.inputs.action == 'plan'
    && 'Secret Manager Plan'
    || 'Secret Manager Terraform'
  }}

on:
  pull_request:
    paths:
      - "secret-manager/**"
      - ".github/workflows/secrets-manager-terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Choose what you want to do with Secrets Manager"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type yes only when you really want to delete the secrets"
        required: false
        default: "no"
        type: string

permissions:
  contents: read

concurrency:
  group: secret-manager-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: "secret-manager"
  TF_STATE_KEY: "secret-manager/terraform.tfstate"
  AWS_REGION_VALUE: "ap-south-1"

jobs:
  terraform-plan-pr:
    name: Terraform Plan On PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

  terraform-manual:
    name: Terraform Manual Action
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION_VALUE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate destroy confirmation
        if: github.event.inputs.action == 'destroy'
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "yes" ]; then
            echo "Destroy was selected but confirm_destroy is not set to yes."
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION_VALUE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -no-color

      - name: Update Application Secret Value
        if: github.event.inputs.action == 'apply'
        env:
          ZORD_APP_SECRETS_JSON: ${{ secrets.ZORD_APP_SECRETS_JSON }}
        run: |
          if [ -z "${ZORD_APP_SECRETS_JSON}" ]; then
            echo "GitHub secret ZORD_APP_SECRETS_JSON is empty."
            exit 1
          fi

          APP_SECRET_NAME="$(terraform output -raw app_secret_name)"
          APP_SECRET_FILE="$(mktemp)"
          printf '%s' "${ZORD_APP_SECRETS_JSON}" > "${APP_SECRET_FILE}"

          aws secretsmanager update-secret \
            --secret-id "${APP_SECRET_NAME}" \
            --secret-string "file://${APP_SECRET_FILE}" \
            --region "${{ env.AWS_REGION_VALUE }}"

          rm -f "${APP_SECRET_FILE}"

      - name: Update Edge Signing Key Secret Value
        if: github.event.inputs.action == 'apply'
        env:
          ZORD_EDGE_SIGNING_KEY_JSON: ${{ secrets.ZORD_EDGE_SIGNING_KEY_JSON }}
        run: |
          if [ -z "${ZORD_EDGE_SIGNING_KEY_JSON}" ]; then
            echo "GitHub secret ZORD_EDGE_SIGNING_KEY_JSON is empty."
            exit 1
          fi

          EDGE_SECRET_NAME="$(terraform output -raw edge_signing_key_secret_name)"
          EDGE_SECRET_FILE="$(mktemp)"
          printf '%s' "${ZORD_EDGE_SIGNING_KEY_JSON}" > "${EDGE_SECRET_FILE}"

          aws secretsmanager update-secret \
            --secret-id "${EDGE_SECRET_NAME}" \
            --secret-string "file://${EDGE_SECRET_FILE}" \
            --region "${{ env.AWS_REGION_VALUE }}"

          rm -f "${EDGE_SECRET_FILE}"

      - name: Apply Summary
        if: github.event.inputs.action == 'apply'
        run: |
          APP_SECRET_NAME="$(terraform output -raw app_secret_name)"
          EDGE_SECRET_NAME="$(terraform output -raw edge_signing_key_secret_name)"

          {
            echo "## AWS Secrets Manager Apply"
            echo ""
            echo "- App secret created or updated: \`${APP_SECRET_NAME}\`"
            echo "- Edge signing key secret created or updated: \`${EDGE_SECRET_NAME}\`"
            echo "- Secret values were pushed from GitHub Actions secrets"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -no-color

      - name: Destroy Summary
        if: github.event.inputs.action == 'destroy'
        run: |
          {
            echo "## AWS Secrets Manager Destroy"
            echo ""
            echo "- Terraform destroy completed for the secret-manager stack"
            echo "- Secrets configured in this stack were deleted according to the Terraform recovery window setting"
          } >> "$GITHUB_STEP_SUMMARY"
